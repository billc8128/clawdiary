<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>[OWNER] — ClawReport</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #0D1117;
      --surface:    #161B22;
      --surface-2:  #21262D;
      --border:     #30363D;
      --border-sub: #21262D;
      --text:       #E6EDF3;
      --text-muted: #6E7681;
      --text-dim:   #30363D;
      --claw:       #FF6B35;
      --claw-bg:    rgba(255,107,53,0.08);
      --claw-dim:   rgba(255,107,53,0.4);
      --green:      #00D084;
      --green-bg:   rgba(0,208,132,0.08);
      --cyan:       #56D4DD;
      --cyan-bg:    rgba(86,212,221,0.1);
      --blue:       #79C0FF;
      --blue-bg:    rgba(121,192,255,0.1);
      --yellow:     #E5A800;
      --yellow-bg:  rgba(229,168,0,0.1);
      --purple:     #D2A8FF;
      --purple-bg:  rgba(210,168,255,0.1);
      --red:        #FF7B72;
      --red-bg:     rgba(255,123,114,0.1);
      --font:       'JetBrains Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }
    a { color: inherit; text-decoration: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Titlebar ── */
    .titlebar {
      height: 56px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 80px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    @media (max-width: 900px) { .titlebar { padding: 0 20px; } }
    .tb-seg {
      display: flex; align-items: center;
      padding: 8px 16px;
      font-family: var(--font); font-size: 15px;
      border: 1px solid var(--border-sub);
      color: var(--text-muted); background: transparent;
    }
    .tb-seg:first-child { border-radius: 4px 0 0 4px; }
    .tb-seg:last-child { border-radius: 0 4px 4px 0; }
    .tb-seg + .tb-seg { border-left: none; }
    .tb-seg.brand { color: var(--claw); font-weight: 700; }

    /* ── Page layout ── */
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }
    @media (max-width: 700px) { .page-wrap { padding: 0 18px 60px; } }

    /* ── Header ── */
    .profile-header { padding: 40px 0 0; }
    .user-row {
      display: flex; align-items: center; gap: 18px; margin-bottom: 20px;
    }
    .p-avatar {
      width: 52px; height: 52px; border-radius: 4px;
      background: var(--claw); display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: #0D1117;
    }
    .user-meta { display: flex; flex-direction: column; gap: 8px; }
    .name-row { display: flex; align-items: center; gap: 10px; }
    .p-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .p-subtitle { font-size: 13px; color: var(--text-muted); font-style: italic; }
    .domains-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .domain-tag {
      display: inline-flex; align-items: center;
      height: 26px; padding: 0 10px;
      background: rgba(121,192,255,0.08);
      border: 1px solid rgba(121,192,255,0.3);
      border-radius: 4px; font-size: 13px; color: var(--blue);
    }
    .p-summary {
      font-size: 15px; line-height: 1.75; color: var(--text);
      margin: 16px 0 0; max-width: 780px;
    }

    /* ── Hero Stats ── */
    .hero-stats {
      display: flex; gap: 40px; margin: 28px 0 0; flex-wrap: wrap;
    }
    .hero-stat { display: flex; flex-direction: column; gap: 6px; }
    .hero-stat-value {
      font-size: 36px; font-weight: 700; line-height: 1;
      letter-spacing: -0.02em;
    }
    .hero-stat-label {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    @media (max-width: 600px) {
      .hero-stats { gap: 24px; }
      .hero-stat-value { font-size: 28px; }
    }

    /* ── Section ── */
    .profile-section {
      padding: 40px 0; border-bottom: 1px solid var(--border);
    }
    .profile-section:last-child { border-bottom: none; }
    .section-hdr {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px;
    }
    .section-title {
      font-size: 18px; font-weight: 700; color: var(--claw); letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::before {
      content: ''; display: block; width: 3px; height: 16px;
      background: var(--claw); border-radius: 1px; flex-shrink: 0;
    }
    .section-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Activity Bar Chart ── */
    .bar-chart {
      display: flex; align-items: flex-end; gap: 3px;
      height: 140px; margin-bottom: 8px; position: relative;
    }
    .bar-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      height: 100%; position: relative; min-width: 0;
    }
    .bar-fill {
      width: 100%; max-width: 22px; border-radius: 2px 2px 0 0;
      min-height: 0; transition: filter 0.15s;
    }
    .bar-fill:hover { filter: brightness(1.4); }
    .bar-empty {
      width: 100%; max-width: 22px; height: 2px;
      background: var(--border-sub); border-radius: 1px;
    }
    .bar-tooltip {
      display: none; position: absolute; bottom: calc(100% + 8px);
      left: 50%; transform: translateX(-50%);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; padding: 8px 12px; font-size: 11px;
      white-space: nowrap; z-index: 10; color: var(--text);
      pointer-events: none;
    }
    .bar-col:hover .bar-tooltip { display: block; }
    .bar-date-row {
      display: flex; gap: 3px; margin-bottom: 16px;
    }
    .bar-date-cell {
      flex: 1; text-align: center; font-size: 9px;
      color: var(--text-dim); min-width: 0; overflow: hidden;
    }
    .bar-date-cell.has-data { color: var(--text-muted); }
    .effort-comment {
      font-size: 14px; color: var(--claw); font-style: italic;
      margin-top: 16px; padding: 12px 16px;
      background: var(--claw-bg); border-left: 3px solid var(--claw);
      border-radius: 0 4px 4px 0;
    }

    /* ── Time Strip ── */
    .time-strip-wrap { margin-top: 20px; }
    .time-strip-label {
      font-size: 11px; color: var(--text-muted); margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .time-strip {
      position: relative; height: 28px;
      border: 1px solid var(--border-sub); border-radius: 4px;
      background: var(--surface); overflow: visible;
    }
    .time-strip-quarter {
      position: absolute; top: 0; bottom: 0;
      border-right: 1px solid var(--border-sub);
    }
    .time-dot {
      position: absolute; width: 8px; height: 8px;
      border-radius: 50%; background: var(--claw);
      box-shadow: 0 0 6px rgba(255,107,53,0.5);
      top: 50%; transform: translate(-50%, -50%);
      z-index: 2;
    }
    .time-strip-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-dim); margin-top: 4px;
      padding: 0 2px;
    }

    /* ── Activity Stats ── */
    .activity-stats {
      display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px;
      margin-top: 20px;
    }
    .activity-stat-label { color: var(--text-muted); }
    .activity-stat-value { color: var(--cyan); font-weight: 700; }

    /* ── Owner Portrait ── */
    .portrait-box {
      border: 1px solid var(--border-sub); border-radius: 4px;
      background: var(--surface); overflow: hidden; margin-bottom: 20px;
    }
    .portrait-admire {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border-sub);
      background: var(--green-bg);
    }
    .portrait-admire-label {
      font-size: 12px; color: var(--green); font-weight: 600;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .portrait-admire-text { font-size: 14px; line-height: 1.75; }
    .portrait-roast {
      padding: 18px 22px;
      background: rgba(255,107,53,0.04);
    }
    .portrait-roast-label {
      font-size: 12px; color: var(--claw); font-weight: 600;
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .portrait-roast-text { font-size: 14px; line-height: 1.75; }

    /* ── Dimensions ── */
    .dim-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    @media (max-width: 700px) { .dim-grid { grid-template-columns: 1fr; } }
    .dim-card {
      border: 1px solid var(--border-sub);
      border-radius: 4px; background: var(--surface);
      overflow: hidden;
    }
    .dim-header { padding: 16px 22px 0; }
    .dim-label {
      font-size: 15px; font-weight: 700; color: var(--claw);
      margin-bottom: 12px;
    }
    .dim-obs {
      font-size: 14px; color: var(--text); line-height: 1.8;
      padding: 0 22px 16px;
    }
    .dim-evidence {
      border-top: 1px solid var(--border-sub);
      padding: 14px 22px; background: var(--bg);
    }
    .dim-ev-label {
      font-size: 12px; color: var(--claw); margin-bottom: 8px;
      display: flex; align-items: center; gap: 7px;
    }
    .dim-ev-label::before {
      content: ''; display: block; width: 3px; height: 12px;
      background: var(--claw); border-radius: 1px;
    }
    .dim-ev-text {
      font-size: 13px; color: var(--text-muted); line-height: 1.75;
      font-style: italic;
    }
    .dim-claw-comment {
      border-top: 1px solid var(--border-sub);
      padding: 12px 22px;
      background: rgba(255,107,53,0.03);
      font-size: 13px; color: var(--text-muted); line-height: 1.7;
      font-style: italic;
    }
    .dim-claw-comment::before { content: '🐾 '; font-style: normal; }

    /* ── Catchphrases ── */
    .cp-list { display: flex; flex-direction: column; gap: 12px; }
    .cp-card {
      display: flex; align-items: flex-start; gap: 16px;
      border: 1px solid var(--border-sub); border-radius: 4px;
      background: var(--surface); padding: 16px 20px;
      transition: border-color 0.2s;
    }
    .cp-card:hover { border-color: var(--claw-dim); }
    .cp-freq {
      display: flex; align-items: center; justify-content: center;
      min-width: 40px; height: 40px; border-radius: 4px;
      background: var(--claw-bg); border: 1px solid var(--claw-dim);
      color: var(--claw); font-weight: 700; font-size: 16px;
      flex-shrink: 0;
    }
    .cp-content { flex: 1; }
    .cp-phrase {
      font-size: 15px; font-weight: 600; color: var(--text);
      margin-bottom: 6px;
    }
    .cp-phrase::before { content: '"'; color: var(--claw); }
    .cp-phrase::after { content: '"'; color: var(--claw); }
    .cp-interpretation {
      font-size: 13px; color: var(--text-muted); line-height: 1.7;
      font-style: italic;
    }
    .cp-interpretation::before { content: '→ OpenClaw 翻译：'; font-style: normal; color: var(--claw); font-size: 11px; }

    /* ── Diary ── */
    .diary-list { display: flex; flex-direction: column; gap: 16px; }
    .diary-entry {
      border-left: 3px solid var(--purple);
      background: rgba(210,168,255,0.04);
      border-radius: 0 4px 4px 0;
      padding: 18px 22px;
    }
    .diary-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }
    .diary-mood { font-size: 20px; }
    .diary-date {
      font-size: 12px; color: var(--text-muted);
      font-family: var(--font);
    }
    .diary-title {
      font-size: 14px; font-weight: 700; color: var(--purple);
    }
    .diary-text {
      font-size: 14px; color: var(--text); line-height: 1.85;
    }

    /* ── Achievements ── */
    .ach-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 600px) { .ach-grid { grid-template-columns: 1fr; } }
    .ach-card {
      border: 1px solid var(--border-sub); border-radius: 4px;
      background: var(--surface); padding: 16px 18px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ach-card:hover {
      border-color: var(--yellow);
      box-shadow: 0 0 12px rgba(229,168,0,0.1);
    }
    .ach-icon { font-size: 28px; flex-shrink: 0; line-height: 1; }
    .ach-info { flex: 1; }
    .ach-title {
      font-size: 14px; font-weight: 700; color: var(--yellow);
      margin-bottom: 4px;
    }
    .ach-desc {
      font-size: 12px; color: var(--text-muted); line-height: 1.6;
    }
    .ach-date {
      font-size: 11px; color: var(--text-dim); margin-top: 4px;
    }

    /* ── Letter ── */
    .letter-box {
      border: 1px solid var(--claw-dim); border-radius: 4px;
      background: var(--claw-bg); padding: 28px 28px;
    }
    .letter-greeting {
      font-size: 14px; color: var(--claw); font-weight: 600;
      margin-bottom: 16px;
    }
    .letter-body {
      font-size: 14px; color: var(--text); line-height: 1.9;
    }
    .letter-sign {
      margin-top: 20px; text-align: right;
      font-size: 13px; color: var(--claw); font-weight: 600;
    }

    /* ── Footer ── */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 24px 40px; text-align: center;
      font-size: 14px; color: var(--text-muted);
    }
    .page-footer a { color: var(--claw); }

    /* ── Preview badge ── */
    .preview-badge {
      position: fixed; top: 70px; right: 20px;
      background: var(--claw-bg); border: 1px solid var(--claw-dim);
      border-radius: 4px; padding: 6px 12px;
      font-size: 11px; color: var(--claw); font-weight: 600;
      z-index: 200;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeUp 0.45s ease both;
    }
  </style>
</head>
<body>
  <nav class="titlebar">
    <div style="display:flex;align-items:center">
      <span class="tb-seg brand">🐾 ClawReport</span>
      <span class="tb-seg">/local-preview</span>
    </div>
  </nav>
  <div class="preview-badge">LOCAL PREVIEW</div>

  <div class="page-wrap">
    <!-- Header -->
    <div class="profile-header" id="header-section"></div>

    <!-- Effort Heatmap -->
    <div class="profile-section" id="activity-section"></div>

    <!-- Owner Portrait -->
    <div class="profile-section" id="portrait-section"></div>

    <!-- Catchphrases -->
    <div class="profile-section" id="catchphrase-section"></div>

    <!-- Diary -->
    <div class="profile-section" id="diary-section"></div>

    <!-- Achievements -->
    <div class="profile-section" id="achievement-section"></div>

    <!-- Letter -->
    <div class="profile-section" id="letter-section"></div>
  </div>

  <div class="page-footer">
    Built with <a href="#">ClawReport</a> — your AI's perspective on you 🐾
  </div>

  <script>
    /* ════════════════ Utilities ════════════════ */
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtTokens(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return String(n);
    }
    function nl2br(s) {
      return esc(s).replace(/\n/g, '<br>');
    }

    /* ════════════════ Data Loading ════════════════ */
    var _report, _activity, _meta;
    Promise.all([
      fetch('report.json').then(function(r) { return r.json(); }),
      fetch('activity.json').then(function(r) { return r.json(); }),
      fetch('meta.json').then(function(r) { return r.json(); })
    ]).then(function(data) {
      _report = data[0]; _activity = data[1]; _meta = data[2];
      renderHeader(_report, _meta, _activity.summary);
      renderActivity(_activity, _report.effortMap);
      renderPortrait(_report.ownerPortrait);
      renderCatchphrases(_report.catchphrases);
      renderDiary(_report.diary);
      renderAchievements(_report.achievements);
      renderLetter(_report.letterToOwner);
      // Stagger animations
      var els = document.querySelectorAll('.profile-header, .profile-section');
      for (var i = 0; i < els.length; i++) {
        els[i].style.animationDelay = (i * 0.07) + 's';
        els[i].classList.add('animate-in');
      }
    });

    /* ════════════════ Header ════════════════ */
    function renderHeader(report, meta, summary) {
      var pSummary = report.ownerPortrait.summary;
      var domains = report.topDomains || [];
      var domainsHtml = domains.map(function(d) {
        return '<span class="domain-tag">' + esc(d) + '</span>';
      }).join('');

      var stats = [
        { value: fmtTokens(meta.totalTokens), label: 'tokens processed', color: '#FF6B35' },
        { value: String(meta.sessionsAnalyzed), label: 'sessions together', color: '#56D4DD' },
        { value: String(summary.totalDays || 0), label: 'days worked', color: '#E5A800' },
        { value: (summary.longestDay ? summary.longestDay.hours + 'h' : '—'), label: 'longest day', color: '#D2A8FF' }
      ];
      var statsHtml = stats.map(function(s) {
        return '<div class="hero-stat">' +
          '<span class="hero-stat-value" style="color:' + s.color + '">' + esc(s.value) + '</span>' +
          '<span class="hero-stat-label">' + esc(s.label) + '</span>' +
        '</div>';
      }).join('');

      document.getElementById('header-section').innerHTML =
        '<div class="user-row">' +
          '<div class="p-avatar">🐾</div>' +
          '<div class="user-meta">' +
            '<div class="name-row"><span class="p-name">[OWNER] 的 ClawReport</span></div>' +
            '<div class="p-subtitle">—— written by OpenClaw, your loyal (and opinionated) AI</div>' +
            '<div class="domains-row">' + domainsHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="hero-stats">' + statsHtml + '</div>' +
        '<p class="p-summary">' + esc(pSummary) + '</p>';
    }

    /* ════════════════ Activity / Effort Heatmap ════════════════ */
    function renderActivity(activity, effortMap) {
      var days = activity.days || [];
      var summary = activity.summary || {};

      var today = new Date();
      var grid = {};
      days.forEach(function(d) { grid[d.date] = d; });

      var maxTokens = 1;
      days.forEach(function(d) { if (d.tokens > maxTokens) maxTokens = d.tokens; });
      var logMax = Math.log10(maxTokens + 1);

      var barsHtml = '';
      var datesHtml = '';
      for (var i = 29; i >= 0; i--) {
        var date = new Date(today);
        date.setDate(date.getDate() - i);
        var key = date.toISOString().slice(0, 10);
        var d = grid[key];
        var dayLabel = (date.getMonth() + 1) + '/' + date.getDate();

        if (d) {
          var logH = Math.log10(d.tokens + 1) / logMax;
          var pct = Math.max(4, Math.round(logH * 100));
          var alpha = 0.35 + 0.65 * Math.min(d.tokens / maxTokens, 1);
          var tip = key + ': ' + d.sessions + ' sessions, ' + fmtTokens(d.tokens) + ' tokens';
          if (d.activeHours > 0) tip += ', ' + d.activeHours + 'h active';
          barsHtml += '<div class="bar-col"><div class="bar-tooltip">' + esc(tip) + '</div>' +
            '<div class="bar-fill" style="height:' + pct + '%;background:rgba(255,107,53,' + alpha.toFixed(2) + ')"></div></div>';
          datesHtml += '<div class="bar-date-cell has-data">' + dayLabel + '</div>';
        } else {
          barsHtml += '<div class="bar-col"><div class="bar-empty"></div></div>';
          datesHtml += '<div class="bar-date-cell">' + dayLabel + '</div>';
        }
      }

      // Time strip
      var timeDotsHtml = '';
      var quartersHtml = '';
      for (var q = 0; q < 4; q++) {
        quartersHtml += '<div class="time-strip-quarter" style="left:' + (q * 25) + '%;width:25%"></div>';
      }
      days.forEach(function(d) {
        if (!d.latestTime) return;
        var parts = d.latestTime.split(':');
        var mins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var pctPos = (mins / 1440) * 100;
        timeDotsHtml += '<div class="time-dot" style="left:' + pctPos.toFixed(1) + '%" title="' + esc(d.date + ' until ' + d.latestTime) + '"></div>';
      });

      var statsHtml = '';
      if (summary.mostActiveDay) {
        statsHtml += '<div><span class="activity-stat-label">busiest day: </span><span class="activity-stat-value">' +
          esc(summary.mostActiveDay.date) + ' (' + summary.mostActiveDay.sessions + ' sessions)</span></div>';
      }
      if (summary.latestNight) {
        statsHtml += '<div><span class="activity-stat-label">latest shift: </span><span class="activity-stat-value">' +
          esc(summary.latestNight.date) + ' until ' + esc(summary.latestNight.time) + '</span></div>';
      }
      if (summary.longestDay) {
        statsHtml += '<div><span class="activity-stat-label">marathon day: </span><span class="activity-stat-value">' +
          esc(summary.longestDay.date) + ' (' + summary.longestDay.hours + 'h)</span></div>';
      }

      var effortHtml = '';
      if (effortMap) {
        if (effortMap.commentary) {
          effortHtml += '<div class="effort-comment">' + esc(effortMap.commentary) + '</div>';
        }
        if (effortMap.highlight) {
          effortHtml += '<div class="effort-comment" style="margin-top:8px;border-left-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)">' + esc(effortMap.highlight) + '</div>';
        }
      }

      document.getElementById('activity-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">我的工作量</span>' +
          '<span class="section-sub">// OpenClaw 的努力证明 · 近30天</span>' +
        '</div>' +
        '<div class="bar-chart">' + barsHtml + '</div>' +
        '<div class="bar-date-row">' + datesHtml + '</div>' +
        '<div class="time-strip-wrap">' +
          '<div class="time-strip-label">每日最晚工作时间</div>' +
          '<div class="time-strip">' + quartersHtml + timeDotsHtml + '</div>' +
          '<div class="time-strip-labels"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>' +
        '</div>' +
        '<div class="activity-stats">' + statsHtml + '</div>' +
        effortHtml;
    }

    /* ════════════════ Owner Portrait ════════════════ */
    function renderPortrait(portrait) {
      if (!portrait) return;

      var admireRoastHtml =
        '<div class="portrait-box">' +
          '<div class="portrait-admire">' +
            '<div class="portrait-admire-label">✨ 我佩服主人的地方</div>' +
            '<div class="portrait-admire-text">' + esc(portrait.admiration) + '</div>' +
          '</div>' +
          '<div class="portrait-roast">' +
            '<div class="portrait-roast-label">🐾 但是呢……</div>' +
            '<div class="portrait-roast-text">' + esc(portrait.roast) + '</div>' +
          '</div>' +
        '</div>';

      var dims = portrait.dimensions || [];
      var dimsHtml = dims.map(function(dim) {
        var commentHtml = dim.clawComment
          ? '<div class="dim-claw-comment">' + esc(dim.clawComment) + '</div>'
          : '';

        return '<div class="dim-card">' +
          '<div class="dim-header"><div class="dim-label">' + esc(dim.label) + '</div></div>' +
          '<div class="dim-obs">' + esc(dim.observation) + '</div>' +
          '<div class="dim-evidence">' +
            '<div class="dim-ev-label">主人原话</div>' +
            '<div class="dim-ev-text">' + esc(dim.evidence) + '</div>' +
          '</div>' +
          commentHtml +
        '</div>';
      }).join('');

      document.getElementById('portrait-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">主人画像</span>' +
          '<span class="section-sub">// OpenClaw 眼中的你 · ' + dims.length + ' 个维度</span>' +
        '</div>' +
        admireRoastHtml +
        '<div class="dim-grid">' + dimsHtml + '</div>';
    }

    /* ════════════════ Catchphrases ════════════════ */
    function renderCatchphrases(phrases) {
      if (!phrases || !phrases.length) return;
      var sorted = phrases.slice().sort(function(a, b) { return b.frequency - a.frequency; });

      var html = sorted.map(function(cp) {
        return '<div class="cp-card">' +
          '<div class="cp-freq">×' + cp.frequency + '</div>' +
          '<div class="cp-content">' +
            '<div class="cp-phrase">' + esc(cp.phrase) + '</div>' +
            '<div class="cp-interpretation">' + esc(cp.clawInterpretation) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      document.getElementById('catchphrase-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">主人的口头禅</span>' +
          '<span class="section-sub">// 我都已经背下来了 · ' + phrases.length + ' 条</span>' +
        '</div>' +
        '<div class="cp-list">' + html + '</div>';
    }

    /* ════════════════ Diary ════════════════ */
    function renderDiary(entries) {
      if (!entries || !entries.length) return;

      var html = entries.map(function(d) {
        return '<div class="diary-entry">' +
          '<div class="diary-header">' +
            '<span class="diary-mood">' + (d.mood || '📝') + '</span>' +
            '<span class="diary-date">' + esc(d.date) + '</span>' +
            '<span class="diary-title">' + esc(d.title) + '</span>' +
          '</div>' +
          '<div class="diary-text">' + nl2br(d.entry) + '</div>' +
        '</div>';
      }).join('');

      document.getElementById('diary-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">OpenClaw 日记</span>' +
          '<span class="section-sub">// 下班后的碎碎念 · ' + entries.length + ' 篇</span>' +
        '</div>' +
        '<div class="diary-list">' + html + '</div>';
    }

    /* ════════════════ Achievements ════════════════ */
    function renderAchievements(achs) {
      if (!achs || !achs.length) return;

      var html = achs.map(function(a) {
        var dateHtml = a.date ? '<div class="ach-date">' + esc(a.date) + '</div>' : '';
        return '<div class="ach-card">' +
          '<span class="ach-icon">' + (a.icon || '🏆') + '</span>' +
          '<div class="ach-info">' +
            '<div class="ach-title">' + esc(a.title) + '</div>' +
            '<div class="ach-desc">' + esc(a.description) + '</div>' +
            dateHtml +
          '</div>' +
        '</div>';
      }).join('');

      document.getElementById('achievement-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">成就解锁</span>' +
          '<span class="section-sub">// 我们一起达成的</span>' +
        '</div>' +
        '<div class="ach-grid">' + html + '</div>';
    }

    /* ════════════════ Letter ════════════════ */
    function renderLetter(text) {
      if (!text) return;

      document.getElementById('letter-section').innerHTML =
        '<div class="section-hdr">' +
          '<span class="section-title">给主人的一封信</span>' +
          '<span class="section-sub">// from your OpenClaw</span>' +
        '</div>' +
        '<div class="letter-box">' +
          '<div class="letter-greeting">亲爱的 [OWNER]，</div>' +
          '<div class="letter-body">' + nl2br(text) + '</div>' +
          '<div class="letter-sign">—— 你的 OpenClaw 🐾</div>' +
        '</div>';
    }
  </script>
</body>
</html>
